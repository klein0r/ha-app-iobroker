name: Deploy

on:
  release:
    types: [published]

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      packages: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "addon=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in config.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ steps.version.outputs.addon }}/' iobroker/config.yaml

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./iobroker
          file: ./iobroker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/klein0r/ha-app-iobroker:latest
            ghcr.io/klein0r/ha-app-iobroker:${{ steps.version.outputs.addon }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.addon }}
            BUILD_DATE=${{ github.event.release.created_at }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
