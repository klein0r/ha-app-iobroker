name: Deploy

on:
  release:
    types: [published]

permissions: {}

jobs:
  information:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.addon }}
      architectures: ${{ steps.info.outputs.architectures }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "addon=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in config.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ steps.version.outputs.addon }}/' iobroker/config.yaml

      - name: Commit updated config.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iobroker/config.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.addon }}"
          git push

      - name: Read architectures from config.yaml
        id: info
        run: |
          ARCHS=$(python3 -c "import yaml,json; d=yaml.safe_load(open('iobroker/config.yaml')); print(json.dumps(d['arch']))")
          echo "architectures=$ARCHS" >> "$GITHUB_OUTPUT"

  build:
    needs: information
    permissions:
      packages: write
    runs-on: ${{ matrix.architecture == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.information.outputs.architectures) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Map architecture to Docker platform
        id: platform
        run: |
          case "${{ matrix.architecture }}" in
            amd64)   echo "platform=linux/amd64" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "platform=linux/arm64" >> "$GITHUB_OUTPUT" ;;
            armv7)   echo "platform=linux/arm/v7" >> "$GITHUB_OUTPUT" ;;
            *)       echo "platform=linux/${{ matrix.architecture }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./iobroker
          file: ./iobroker/Dockerfile
          push: true
          platforms: ${{ steps.platform.outputs.platform }}
          tags: |
            ghcr.io/klein0r/ha-app-iobroker-${{ matrix.architecture }}:${{ needs.information.outputs.version }}
            ghcr.io/klein0r/ha-app-iobroker-${{ matrix.architecture }}:latest
          build-args: |
            BUILD_ARCH=${{ matrix.architecture }}
            BUILD_VERSION=${{ needs.information.outputs.version }}
            BUILD_DATE=${{ github.event.release.created_at }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
